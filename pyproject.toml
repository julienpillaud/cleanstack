[project]
name = "cleanstack"
version = "0.19.0"
requires-python = ">=3.14"
dependencies = [
    "faker>=40.12.0",
    "fastapi[standard]>=0.135.3",
    "protest",
]

[project.optional-dependencies]
mongo = [
    "pymongo>=4.16.0",
]
sql = [
    "psycopg[binary]>=3.3.3",
    "sqlalchemy>=2.0.48",
]

[dependency-groups]
dev = [
    "mypy>=1.20.0",
    "pre-commit>=4.5.1",
    "pytest>=9.0.2",
    "ruff>=0.15.9",
]

[tool.uv.sources]
protest = { git = "https://github.com/renaudcepre/protest.git", tag = "protest-v0.1.2" }

[tool.setuptools.packages.find]
include = ["cleanstack*"]

[tool.ruff]
output-format = "concise"
[tool.ruff.lint]
select = [
    "E", "W", # pycodestyle
    "F", # Pyflakes
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "SIM", # flake8-simplify
    "I", # isort
    "PL", # Pylint
    "RUF",
]
ignore = [
    "PLR0911", # Too many return statements (7 > 6)
    "PLR0913", # Too many arguments in function definition (6 > 5)
]

[tool.mypy]
strict = true
plugins = ['pydantic.mypy']

[tool.pytest.ini_options]
testpaths = ["tests"]
log_cli = true
log_cli_level = "info"
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)30s - %(message)s"
